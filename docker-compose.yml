version: '3.8'

services:
  db:
    image: postgres:15
    container_name: yelp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Nigel@8898
      POSTGRES_DB: yelp_analytics_engine
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
      build:
        context: ./api-service
        dockerfile: Dockerfile
      container_name: yelp_api
      depends_on:
        - db
      ports:
        - "5000:5000"
      environment:
        DATABASE_URL: postgresql://postgres:Nigel@8898@db:5432/yelp_analytics_engine

volumes:
  postgres_data: